---
- name: Verify every Patroni member is healthy
  ansible.builtin.uri:
    url: >-
      {{ patroni_restapi_protocol | default('https') }}://{{ hostvars[item].patroni_restapi_connect_addr
        | default(hostvars[item].patroni_bind_address
        | default(hostvars[item].bind_address, true), true) }}:{{ patroni_restapi_port
        | default('8008') }}/health
    status_code: 200
    ca_path: "{{ patroni_restapi_cafile | default(omit, true) }}"
  loop: "{{ groups['postgres_cluster'] }}"
  changed_when: false
  environment:
    no_proxy: "{{ hostvars[item].patroni_bind_address | default(hostvars[item].bind_address, true) }}"

- name: Refresh every Patroni member role
  ansible.builtin.uri:
    url: >-
      {{ patroni_restapi_protocol | default('https') }}://{{ hostvars[item].patroni_restapi_connect_addr
        | default(hostvars[item].patroni_bind_address
        | default(hostvars[item].bind_address, true), true) }}:{{ patroni_restapi_port
        | default('8008') }}/leader
    status_code: [200, 503]
    ca_path: "{{ patroni_restapi_cafile | default(omit, true) }}"
  loop: "{{ groups['postgres_cluster'] }}"
  register: operation_topology_roles
  changed_when: false
  environment:
    no_proxy: "{{ hostvars[item].patroni_bind_address | default(hostvars[item].bind_address, true) }}"

- name: Require exactly one healthy leader
  ansible.builtin.assert:
    that:
      - operation_topology_roles.results | length == groups['postgres_cluster'] | length
      - operation_topology_roles.results | selectattr('status', 'equalto', 200) | list | length == 1

- name: Verify every primary route reaches writable PostgreSQL
  become_user: postgres
  ansible.builtin.command:
    argv:
      - "{{ postgresql_bin_dir }}/psql"
      - -h
      - "{{ item.address }}"
      - -p
      - "{{ item.port | string }}"
      - -U
      - "{{ patroni_superuser_username }}"
      - -d
      - postgres
      - -tAXc
      - "select pg_is_in_recovery()"
  environment:
    PGPASSWORD: "{{ patroni_superuser_password }}"
  loop: "{{ operation_primary_routing_targets }}"
  register: operation_routing_checks
  changed_when: false
  no_log: true

- name: Require every primary route to be writable
  ansible.builtin.assert:
    that:
      - operation_primary_routing_targets | length > 0
      - operation_routing_checks.results | map(attribute='stdout') | unique | list == ['f']
  no_log: true

---
# Extension Auto-Setup: repository

# The deb822_repository module does not create /etc/apt/sources.list.d/;
# ensure it exists once before adding any extension repository.
- name: Ensure /etc/apt/sources.list.d directory exists
  ansible.builtin.file:
    path: /etc/apt/sources.list.d
    state: directory
    mode: "0755"
  when: ansible_os_family == "Debian"
  tags: add_repo, timescaledb, timescale, citus, pg_stat_monitor

- block:
    - name: pg_stat_monitor | Install Percona repository tool dependencies
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg2
          - lsb-release
        state: present

    - name: pg_stat_monitor | Download Percona repository tool
      ansible.builtin.get_url:
        url: "https://repo.percona.com/apt/percona-release_latest.generic_all.deb"
        dest: "/tmp/percona-release_latest.generic_all.deb"
        mode: "0644"

    - name: pg_stat_monitor | Install Percona repository tool
      ansible.builtin.apt:
        deb: "/tmp/percona-release_latest.generic_all.deb"
        state: present

    - name: pg_stat_monitor | Enable Percona PostgreSQL repository
      ansible.builtin.command: >-
        percona-release enable ppg-{{ postgresql_version }} release --scheme https
      changed_when: false

    - name: pg_stat_monitor | Pin repository to extension package
      ansible.builtin.copy:
        dest: "/etc/apt/preferences.d/autobase-pg-stat-monitor"
        mode: "0644"
        content: |
          Package: *
          Pin: origin "repo.percona.com"
          Pin-Priority: 1

          Package: percona-pg-stat-monitor*
          Pin: origin "repo.percona.com"
          Pin-Priority: 700
  environment: "{{ proxy_env | default({}) }}"
  when:
    - enable_pg_stat_monitor | default(false) | bool
    - ansible_os_family == "Debian"
  tags: add_repo, pg_stat_monitor

# TimescaleDB (if 'enable_timescale' is 'true')
- block:
    # Debian based
    - name: Add TimescaleDB repository
      ansible.builtin.deb822_repository:
        name: "timescaledb"
        types: [deb]
        uris: "https://packagecloud.io/timescale/timescaledb/{{ ansible_distribution | lower }}" # amd64 and arm64 are supported
        signed_by: "https://packagecloud.io/timescale/timescaledb/gpgkey"
        suites: "{{ ansible_distribution_release }}"
        components: [main]
        state: present
        enabled: true
      when: ansible_os_family == "Debian"

    # RedHat based
    - name: Add TimescaleDB repository
      ansible.builtin.yum_repository:
        name: "timescaledb"
        description: "TimescaleDB Repository"
        baseurl: "https://packagecloud.io/timescale/timescaledb/el/{{ ansible_distribution_major_version }}/x86_64" # no arm64 support
        gpgkey: "https://packagecloud.io/timescale/timescaledb/gpgkey"
        gpgcheck: "no"
      when: ansible_os_family == "RedHat" and ansible_architecture in ["x86_64", "amd64"]
  environment: "{{ proxy_env | default({}) }}"
  when: (enable_timescale | default(false) | bool) or (enable_timescaledb | default(false) | bool)
  tags: add_repo, timescaledb, timescale

# Citus (if 'enable_citus' is 'true')
- block:
    # Debian based
    - name: Add Citus repository
      ansible.builtin.deb822_repository:
        name: "citusdata"
        types: [deb]
        uris: "https://repos.citusdata.com/community/{{ ansible_distribution | lower }}/" # no arm64 support (TODO)
        suites: "{{ ansible_distribution_release }}"
        components: [main]
        signed_by: "https://repos.citusdata.com/community/gpgkey"
        state: present
        enabled: true
      when: ansible_os_family == "Debian" and ansible_architecture in ["x86_64", "amd64"]

    # RedHat based
    # TODO: Tests have shown that distributions such as Rocky Linux, AlmaLinux, Oracle Linux, and CentOS Stream are not yet supported.
  #    - name: Add Citus repository
  #      ansible.builtin.yum_repository:
  #        name: "citusdata"
  #        description: "Citus Repository"
  #        baseurl: "https://repos.citusdata.com/community/yum/{{ ansible_distribution_major_version }}/x86_64"
  #        gpgkey: "https://repos.citusdata.com/community/gpgkey"
  #        gpgcheck: "no"
  #      when: ansible_os_family == "RedHat"
  environment: "{{ proxy_env | default({}) }}"
  when:
    - enable_citus | default(false) | bool
    - postgresql_version | int >= 11
  tags: add_repo, citus

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
  register: apt_status
  until: apt_status is success
  delay: 5
  retries: 3
  environment: "{{ proxy_env | default({}) }}"
  when: ansible_os_family == "Debian"
  tags: add_repo, timescaledb, timescale, citus, pg_stat_monitor
